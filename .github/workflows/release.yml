name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
            ext: ""
            cc: gcc
            appimage: true

          - os: windows-latest
            goos: windows
            arch: amd64
            ext: ".exe"
            cc: gcc
            appimage: false

          - os: macos-latest
            goos: darwin
            arch: amd64
            ext: ""
            cc: clang
            appimage: false

          - os: macos-latest
            goos: darwin
            arch: arm64
            ext: ""
            cc: clang
            appimage: false

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          wails build -platform ${{ matrix.goos }}/${{ matrix.arch }} -o YourQL-${{ matrix.goos }}-${{ matrix.arch }}

      - name: Upload raw binary
        uses: actions/upload-artifact@v4
        with:
          name: YourQL-${{ matrix.goos }}-${{ matrix.arch }}
          path: build/bin/YourQL-${{ matrix.goos }}-${{ matrix.arch }}${{ matrix.ext }}

      # --- AppImage packaging (Linux only) ---
      - name: Create AppDir
        if: matrix.appimage
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          # Binary
          cp build/bin/YourQL-linux-amd64 AppDir/usr/bin/yourql

          # Desktop entry
          cat > AppDir/usr/share/applications/yourql.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=YourQL
          Comment=Natural language database queries
          Exec=yourql
          Icon=yourql
          Type=Application
          Categories=Development;Database;
          Terminal=false
          DESKTOP
          ln -s usr/share/applications/yourql.desktop AppDir/yourql.desktop

          # Icon (generate a simple 256x256 PNG)
          sudo apt-get install -y imagemagick
          convert -size 256x256 xc:'#1a1a1a' \
            -fill '#0288d1' -draw 'roundrectangle 48,48 208,208 20,20' \
            -fill white -font Helvetica-Bold -pointsize 120 -gravity center -annotate 0 'YQ' \
            AppDir/usr/share/icons/hicolor/256x256/apps/yourql.png
          ln -s usr/share/icons/hicolor/256x256/apps/yourql.png AppDir/yourql.png

          # AppRun launcher
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/yourql" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Build AppImage
        if: matrix.appimage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --output appimage

      - name: Upload AppImage
        if: matrix.appimage
        uses: actions/upload-artifact@v4
        with:
          name: YourQL-linux-x86_64-AppImage
          path: YourQL-*.AppImage

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/YourQL-darwin-arm64/YourQL-darwin-arm64
            artifacts/YourQL-darwin-amd64/YourQL-darwin-amd64
            artifacts/YourQL-linux-x86_64-AppImage/*.AppImage
            artifacts/YourQL-windows-amd64/YourQL-windows-amd64.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}