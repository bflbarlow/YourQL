name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - run: |
          wails build -platform darwin/arm64 -f
          cd build/bin && zip -r YourQL-darwin-arm64.zip YourQL.app
      - uses: actions/upload-artifact@v4
        with:
          name: YourQL-darwin-arm64
          path: build/bin/YourQL-darwin-arm64.zip

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - run: |
          wails build -platform darwin/amd64 -f
          cd build/bin && zip -r YourQL-darwin-amd64.zip YourQL.app
      - uses: actions/upload-artifact@v4
        with:
          name: YourQL-darwin-amd64
          path: build/bin/YourQL-darwin-amd64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - run: wails build -platform windows/amd64 -o YourQL-windows-amd64.exe -tags native_webview2loader -f
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: YourQL-windows-amd64.exe
          path: build/bin/YourQL-windows-amd64.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - run: |
          wails build -platform linux/amd64 -f
          mv build/bin/YourQL build/bin/YourQL-linux-amd64 || true
      - uses: actions/upload-artifact@v4
        with:
          name: YourQL-linux-amd64
          path: build/bin/YourQL-linux-amd64

  build-appimage:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: YourQL-linux-amd64
          path: .

      - name: Create AppDir
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-0 libwebkit2gtk-4.1-0 imagemagick

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/share/applications

          # Copy binary
          cp YourQL-linux-amd64 AppDir/usr/bin/yourql
          chmod +x AppDir/usr/bin/yourql

          # Desktop entry
          cat > AppDir/usr/share/applications/yourql.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=YourQL
          Comment=Natural language database queries
          Exec=yourql
          Icon=yourql
          Type=Application
          Categories=Development;Database;
          Terminal=false
          DESKTOP
          ln -s usr/share/applications/yourql.desktop AppDir/yourql.desktop

          # Generate icon
          convert -size 256x256 xc:'#1a1a1a' \
            -fill '#0288d1' -draw 'roundrectangle 48,48 208,208 24,24' \
            -fill white -font Helvetica-Bold -pointsize 110 -gravity center -annotate 0 'YQ' \
            AppDir/usr/share/icons/hicolor/256x256/apps/yourql.png
          ln -s usr/share/icons/hicolor/256x256/apps/yourql.png AppDir/yourql.png

          # AppRun
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export PATH="$HERE/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$HERE/usr/lib:$LD_LIBRARY_PATH"
          exec "$HERE/usr/bin/yourql" "$@"
          APPRUN
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          # Download linuxdeploy + GTK plugin
          wget -q -O linuxdeploy.AppImage \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy.AppImage linuxdeploy-plugin-gtk.sh

          # Set output name
          export LDAI_OUTPUT="YourQL-x86_64.AppImage"

          ./linuxdeploy.AppImage \
            --appdir AppDir \
            --plugin gtk \
            --output appimage

      - uses: actions/upload-artifact@v4
        with:
          name: YourQL-x86_64.AppImage
          path: YourQL-x86_64.AppImage

  release:
    needs: [build-macos-arm64, build-macos-amd64, build-windows, build-linux, build-appimage]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/**/*
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}