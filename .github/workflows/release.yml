name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            arch: amd64
            ext: ""
            cc: gcc

          - os: windows-latest
            goos: windows
            arch: amd64
            ext: ".exe"
            cc: gcc

          - os: macos-latest
            goos: darwin
            arch: amd64
            ext: ""
            cc: clang

          - os: macos-latest
            goos: darwin
            arch: arm64
            ext: ""
            cc: clang

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.cc }}
        run: |
          wails build -platform ${{ matrix.goos }}/${{ matrix.arch }} -o YourQL-${{ matrix.goos }}-${{ matrix.arch }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YourQL-${{ matrix.goos }}-${{ matrix.arch }}
          path: build/bin/YourQL-${{ matrix.goos }}-${{ matrix.arch }}${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: |
            artifacts/YourQL-darwin-arm64/YourQL-darwin-arm64
            artifacts/YourQL-darwin-amd64/YourQL-darwin-amd64
            artifacts/YourQL-linux-amd64/YourQL-linux-amd64
            artifacts/YourQL-windows-amd64/YourQL-windows-amd64.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}